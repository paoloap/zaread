name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: shellcheck zaread

  desktop-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate desktop entry
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq desktop-file-utils
          desktop-file-validate zaread.desktop
