name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches script version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          script_ver=$(grep '^VERSION=' zaread | cut -d'"' -f2)
          tag_ver="${TAG#v}"
          if [ "$script_ver" != "$tag_ver" ]; then
            echo "::error::Tag $TAG does not match VERSION=$script_ver in zaread"
            exit 1
          fi

      - name: Lint
        run: shellcheck zaread

      - name: Generate release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          prev_tag=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")
          if [ -n "$prev_tag" ]; then
            git log --pretty=format:"- %s" "$prev_tag..$TAG" > /tmp/notes.md
          else
            echo "Initial release" > /tmp/notes.md
          fi
          cat /tmp/notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --title "$TAG" --notes-file /tmp/notes.md zaread
